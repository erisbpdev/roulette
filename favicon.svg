<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2e08"/>
      <stop offset="20%" stop-color="#a67c32"/>
      <stop offset="50%" stop-color="#ffe8b0"/>
      <stop offset="80%" stop-color="#a67c32"/>
      <stop offset="100%" stop-color="#4a2e08"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5e1a"/>
      <stop offset="50%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#6b4410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a3d3dc" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#a3d3dc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a3d3dc" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="8" fill="#020408"/>

  <!-- Teal light rays glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="12" cy="10" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="52" cy="14" r="0.5" fill="#a3d3dc" opacity="0.4"/>
  <circle cx="8" cy="48" r="0.4" fill="#fff" opacity="0.3"/>
  <circle cx="55" cy="50" r="0.6" fill="#a3d3dc" opacity="0.5"/>
  <circle cx="28" cy="8" r="0.3" fill="#fff" opacity="0.35"/>
  <circle cx="46" cy="56" r="0.4" fill="#fff" opacity="0.3"/>

  <!-- Ornate shield/banner shape (simplified) -->
  <path d="M32 14 C38 14, 46 16, 48 20 L50 28 C50 32, 48 38, 44 42 L38 48 C36 50, 34 50, 32 50 C30 50, 28 50, 26 48 L20 42 C16 38, 14 32, 14 28 L16 20 C18 16, 26 14, 32 14Z"
        fill="#0a1520" stroke="url(#goldBorder)" stroke-width="1.5" filter="url(#glowFilter)"/>

  <!-- Inner shield detail -->
  <path d="M32 18 C36 18, 42 19, 44 22 L45 28 C45 31, 44 35, 41 38 L36 43 C35 44, 33 44, 32 44 C31 44, 29 44, 28 43 L23 38 C20 35, 19 31, 19 28 L20 22 C22 19, 28 18, 32 18Z"
        fill="none" stroke="#c8a84e" stroke-width="0.5" opacity="0.3"/>

  <!-- TR text -->
  <text x="32" y="36" text-anchor="middle" font-family="serif" font-weight="900" font-size="16" fill="url(#gold)" filter="url(#glowFilter)">TR</text>
</svg>
