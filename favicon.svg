<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="50%" stop-color="#c8aa6e"/>
      <stop offset="100%" stop-color="#8a6d3b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="topLeft"><polygon points="0,0 64,0 0,64"/></clipPath>
    <clipPath id="botRight"><polygon points="64,0 64,64 0,64"/></clipPath>
  </defs>

  <!-- Deep void background -->
  <rect width="64" height="64" fill="#06080d"/>

  <!-- Blue shard — top-left half, shifted apart from center -->
  <g clip-path="url(#topLeft)">
    <polygon points="10,6 34,28 18,52 2,30" fill="url(#blue)" opacity="0.85" transform="translate(-2,-2)"/>
    <polygon points="14,10 30,26 20,44 6,28" fill="#0ea5e9" opacity="0.15"/>
  </g>

  <!-- Red shard — bottom-right half, shifted apart -->
  <g clip-path="url(#botRight)">
    <polygon points="54,58 30,36 46,12 62,34" fill="url(#red)" opacity="0.85" transform="translate(2,2)"/>
    <polygon points="50,54 34,38 44,20 58,36" fill="#f43f5e" opacity="0.15"/>
  </g>

  <!-- Gold fracture line — the clash -->
  <line x1="6" y1="58" x2="58" y2="6" stroke="url(#gold)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Energy particles along the fracture -->
  <circle cx="20" cy="44" r="1.5" fill="#c8aa6e" opacity="0.9"/>
  <circle cx="27" cy="37" r="1" fill="#f5e6c8" opacity="0.7"/>
  <circle cx="32" cy="32" r="2" fill="#c8aa6e" filter="url(#glow)"/>
  <circle cx="37" cy="27" r="1" fill="#f5e6c8" opacity="0.7"/>
  <circle cx="44" cy="20" r="1.5" fill="#c8aa6e" opacity="0.9"/>

  <!-- Scatter fragments — debris from the split -->
  <polygon points="15,18 18,15 20,19 17,21" fill="#0ea5e9" opacity="0.5" transform="rotate(-15 17 18)"/>
  <polygon points="48,42 51,40 52,44 49,45" fill="#f43f5e" opacity="0.5" transform="rotate(20 50 43)"/>
  <polygon points="24,12 26,10 27,13" fill="#38bdf8" opacity="0.35"/>
  <polygon points="40,50 42,48 43,52" fill="#fb7185" opacity="0.35"/>

  <!-- Corner diamond accent -->
  <polygon points="32,2 35,5 32,8 29,5" fill="#c8aa6e" opacity="0.5"/>
</svg>
