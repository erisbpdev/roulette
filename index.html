<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Roulette — LoL Custom Games</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@700;800;900&family=Oxanium:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --void: #020408;
    --abyss: #060a14;
    --surface: rgba(8, 14, 28, 0.7);
    --border: rgba(255, 255, 255, 0.04);
    --text: #c8ccd4;
    --text-dim: #3a3f4a;
    --blue: #00b4ff;
    --blue-hot: #4dd9ff;
    --blue-glow: rgba(0, 180, 255, 0.4);
    --blue-deep: rgba(0, 180, 255, 0.08);
    --red: #ff2d55;
    --red-hot: #ff6b8a;
    --red-glow: rgba(255, 45, 85, 0.4);
    --red-deep: rgba(255, 45, 85, 0.08);
    --gold: #c8aa6e;
    --gold-hot: #ffe4a8;
    --gold-dim: rgba(200, 170, 110, 0.1);
  }

  html { height: 100%; }

  body {
    font-family: 'Oxanium', sans-serif;
    background: var(--void);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ══════════════════════════════════════
     LAYER 0: Canvas (particles + geometry)
     ══════════════════════════════════════ */
  #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ══════════════════════════════════════
     LAYER 1: Dramatic diagonal rift
     ══════════════════════════════════════ */
  .rift {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .rift::before {
    content: '';
    position: absolute;
    top: -40%; left: -60%;
    width: 120%; height: 180%;
    background: conic-gradient(from 200deg at 30% 50%, rgba(0, 180, 255, 0.07) 0deg, transparent 60deg, transparent 360deg);
    animation: riftRotateBlue 25s linear infinite;
  }
  .rift::after {
    content: '';
    position: absolute;
    top: -40%; right: -60%;
    width: 120%; height: 180%;
    background: conic-gradient(from 20deg at 70% 50%, rgba(255, 45, 85, 0.07) 0deg, transparent 60deg, transparent 360deg);
    animation: riftRotateRed 30s linear infinite reverse;
  }
  @keyframes riftRotateBlue { to { transform: rotate(360deg); } }
  @keyframes riftRotateRed { to { transform: rotate(-360deg); } }

  /* ══════════════════════════════════════
     LAYER 2: Scanline + grain
     ══════════════════════════════════════ */
  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    opacity: 0.4;
  }
  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* ══════════════════════════════════════
     LAYER 3: The diagonal clash line
     ══════════════════════════════════════ */
  .clash-line {
    position: fixed;
    top: 0; left: 50%;
    width: 2px; height: 150vh;
    background: linear-gradient(180deg, transparent 0%, rgba(200, 170, 110, 0.15) 30%, rgba(200, 170, 110, 0.3) 50%, rgba(200, 170, 110, 0.15) 70%, transparent 100%);
    transform-origin: top center;
    transform: rotate(25deg) translateX(-50%);
    z-index: 1; pointer-events: none;
    animation: clashPulse 4s ease-in-out infinite;
  }
  @keyframes clashPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ══════════════════════════════════════
     APP CONTAINER
     ══════════════════════════════════════ */
  .app {
    position: relative; z-index: 2;
    max-width: 980px; margin: 0 auto; padding: 60px 28px 100px;
  }

  /* ══════════════════════════════════════
     HEADER — massive, stencil, overlapping
     ══════════════════════════════════════ */
  .header {
    text-align: center;
    margin-bottom: 72px;
    position: relative;
    overflow: visible;
  }

  .header-ghost {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-weight: 900;
    font-size: clamp(100px, 20vw, 220px);
    letter-spacing: -4px;
    line-height: 0.75;
    color: transparent;
    -webkit-text-stroke: 1px rgba(200, 170, 110, 0.06);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .header h1 {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-weight: 900;
    font-size: clamp(52px, 9vw, 90px);
    letter-spacing: 8px;
    line-height: 0.85;
    position: relative;
    text-transform: uppercase;
  }

  .header h1 .word-team {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--gold);
    filter: drop-shadow(0 0 20px rgba(200, 170, 110, 0.2));
  }

  .header h1 .word-roulette {
    display: block;
    background: linear-gradient(90deg, var(--blue) 0%, var(--gold) 50%, var(--red) 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 30px rgba(200, 170, 110, 0.15));
  }

  .header .tagline {
    margin-top: 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 8px; text-transform: uppercase;
    color: var(--text-dim);
    position: relative;
  }

  .header .tagline::before, .header .tagline::after {
    content: ''; position: absolute; top: 50%;
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 170, 110, 0.2));
  }
  .header .tagline::before { right: calc(100% + 16px); }
  .header .tagline::after { left: calc(100% + 16px); transform: scaleX(-1); }

  /* ══════════════════════════════════════
     PANELS — clipped corners, animated borders
     ══════════════════════════════════════ */
  .panel {
    position: relative;
    background: var(--surface);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    margin-bottom: 16px;
    padding: 36px 32px;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  /* Animated border trace */
  .panel::before {
    content: '';
    position: absolute; inset: 0;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    padding: 1px;
    background: linear-gradient(135deg, rgba(200, 170, 110, 0.15), transparent 40%, transparent 60%, rgba(200, 170, 110, 0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }

  /* Corner tick marks */
  .panel::after {
    content: '';
    position: absolute; top: 6px; right: 20px;
    width: 12px; height: 12px;
    border-right: 1px solid rgba(200, 170, 110, 0.2);
    border-top: 1px solid rgba(200, 170, 110, 0.2);
    pointer-events: none;
  }

  .panel-label {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }

  .panel-label::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--gold);
    opacity: 0.6;
  }

  /* ══════════════════════════════════════
     INPUT
     ══════════════════════════════════════ */
  .input-row { display: flex; gap: 10px; margin-bottom: 24px; }

  .input-row input {
    flex: 1;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 0;
    padding: 14px 20px;
    color: var(--text);
    font-family: 'Oxanium', sans-serif;
    font-size: 14px; font-weight: 600;
    outline: none;
    transition: all 0.3s;
    letter-spacing: 1px;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .input-row input::placeholder { color: var(--text-dim); font-weight: 400; }
  .input-row input:focus {
    border-color: rgba(200, 170, 110, 0.3);
    box-shadow: inset 0 0 30px rgba(200, 170, 110, 0.03), 0 0 0 1px rgba(200, 170, 110, 0.1);
  }

  .btn-add {
    background: transparent;
    border: 1px solid rgba(200, 170, 110, 0.15);
    color: var(--gold);
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 4px;
    padding: 0 28px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .btn-add:hover {
    background: var(--gold-dim);
    border-color: rgba(200, 170, 110, 0.4);
    text-shadow: 0 0 16px rgba(200, 170, 110, 0.5);
  }

  /* ── Player Tags ── */
  .players-pool { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }

  .player-tag {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(200, 170, 110, 0.03);
    border: 1px solid rgba(200, 170, 110, 0.08);
    padding: 7px 14px 7px 18px;
    font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
    animation: tagIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }

  .player-tag::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 2px; background: var(--gold); opacity: 0.5;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: translateY(10px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .player-tag .tag-name { color: var(--gold-hot); }
  .player-tag .remove {
    width: 14px; height: 14px; border: none; background: transparent;
    color: var(--text-dim); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .player-tag .remove:hover { color: var(--red); }
  .empty-state { color: var(--text-dim); font-size: 13px; padding: 6px 0; letter-spacing: 2px; text-transform: uppercase; font-family: 'Oxanium', sans-serif; }
  .player-count {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
    width: 100%; letter-spacing: 2px; text-transform: uppercase;
  }
  .player-count strong {
    color: var(--gold);
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 16px;
  }

  /* ══════════════════════════════════════
     SAVE / LOAD
     ══════════════════════════════════════ */
  .save-load-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
  }
  .btn-save {
    background: transparent;
    border: 1px solid rgba(200, 170, 110, 0.12);
    color: var(--gold);
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 4px;
    padding: 6px 16px; cursor: pointer;
    clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    transition: all 0.3s; flex-shrink: 0;
  }
  .btn-save:hover { border-color: var(--gold); background: var(--gold-dim); }

  .saved-teams { display: flex; gap: 6px; flex-wrap: wrap; }

  .saved-team-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(200, 170, 110, 0.04);
    border: 1px solid rgba(200, 170, 110, 0.1);
    padding: 5px 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--gold-hot); cursor: pointer;
    clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    transition: all 0.3s;
    animation: tagIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .saved-team-tag:hover { background: rgba(200, 170, 110, 0.1); border-color: var(--gold); }
  .saved-team-tag .saved-count {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 13px; color: var(--text-dim);
  }
  .saved-team-tag .delete-saved {
    width: 12px; height: 12px; border: none; background: transparent;
    color: var(--text-dim); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; padding: 0; margin-left: 2px;
  }
  .saved-team-tag .delete-saved:hover { color: var(--red); }

  /* ══════════════════════════════════════
     BAN SECTION
     ══════════════════════════════════════ */
  .ban-section {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
  }
  .ban-label {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: var(--red); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .ban-label::before {
    content: ''; width: 3px; height: 11px; background: var(--red); opacity: 0.6;
  }
  .ban-input-wrap { position: relative; margin-bottom: 12px; }
  .ban-input-wrap input {
    width: 100%;
    background: rgba(255, 45, 85, 0.04);
    border: 1px solid rgba(255, 45, 85, 0.1);
    border-radius: 0; padding: 10px 16px;
    color: var(--text); font-family: 'Oxanium', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 1px; outline: none;
    transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }
  .ban-input-wrap input::placeholder { color: var(--text-dim); font-weight: 400; }
  .ban-input-wrap input:focus {
    border-color: rgba(255, 45, 85, 0.3);
    box-shadow: inset 0 0 30px rgba(255, 45, 85, 0.03), 0 0 0 1px rgba(255, 45, 85, 0.1);
  }
  .ban-suggestions {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: #0a0e1a; border: 1px solid rgba(255, 45, 85, 0.15);
    max-height: 180px; overflow-y: auto; z-index: 50;
  }
  .ban-suggestions.visible { display: block; }
  .ban-suggestion {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; cursor: pointer; transition: background 0.15s;
    font-size: 13px; letter-spacing: 0.5px;
  }
  .ban-suggestion:hover { background: rgba(255, 45, 85, 0.1); }
  .ban-suggestion img {
    width: 24px; height: 24px; object-fit: cover;
    clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  }
  .ban-pool { display: flex; flex-wrap: wrap; gap: 6px; }
  .ban-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255, 45, 85, 0.06);
    border: 1px solid rgba(255, 45, 85, 0.15);
    padding: 5px 12px 5px 6px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    color: var(--red-hot);
    animation: tagIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  }
  .ban-tag img {
    width: 22px; height: 22px; object-fit: cover;
    clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  }
  .ban-tag .remove-ban {
    width: 12px; height: 12px; border: none; background: transparent;
    color: rgba(255, 45, 85, 0.4); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; padding: 0;
  }
  .ban-tag .remove-ban:hover { color: #fff; }

  /* ══════════════════════════════════════
     OPTIONS
     ══════════════════════════════════════ */
  .options-grid { display: flex; flex-wrap: wrap; gap: 12px 40px; }
  .option-item { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; user-select: none; padding: 4px 0; }
  .option-item input[type="checkbox"] { display: none; }
  .checkbox-visual {
    width: 18px; height: 18px; border: 1px solid rgba(200, 170, 110, 0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; flex-shrink: 0; margin-top: 3px;
    clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  }
  .checkbox-visual::after {
    content: ''; width: 8px; height: 8px; background: var(--gold);
    clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
    transform: scale(0); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .option-item input:checked + .checkbox-visual {
    border-color: var(--gold);
    box-shadow: 0 0 10px var(--gold-dim), inset 0 0 6px rgba(200, 170, 110, 0.05);
  }
  .option-item input:checked + .checkbox-visual::after { transform: scale(1); }
  .option-item:hover .checkbox-visual { border-color: rgba(200, 170, 110, 0.35); }
  .option-item.disabled { opacity: 0.2; pointer-events: none; }
  .option-label { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--text); }
  .option-desc { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; margin-top: 2px; }
  .data-status {
    font-family: 'Oxanium', sans-serif;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.03);
    color: var(--text-dim); display: none;
  }
  .data-status.visible { display: block; }
  .data-status .count { color: var(--gold); font-weight: 700; }
  .data-status.error { color: var(--red); }

  /* ══════════════════════════════════════
     THE BUTTON — pulsing energy core
     ══════════════════════════════════════ */
  .action-bar { display: flex; flex-direction: column; align-items: center; gap: 16px; margin: 40px 0 60px; }
  .btn-randomize-wrap { position: relative; display: inline-block; }

  /* Outer energy rings */
  .btn-ring-outer, .btn-ring-inner {
    position: absolute; border-radius: 0; pointer-events: none;
    border: 1px solid rgba(200, 170, 110, 0.06);
  }
  .btn-ring-outer {
    inset: -16px;
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
    animation: ringBreath 4s ease-in-out infinite;
  }
  .btn-ring-inner {
    inset: -6px;
    clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px), 0 6px);
    animation: ringBreath 4s ease-in-out infinite 1s;
  }
  @keyframes ringBreath { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  .btn-randomize {
    position: relative;
    background: transparent;
    border: 1px solid rgba(200, 170, 110, 0.12);
    color: var(--gold-hot);
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 30px; font-weight: 800;
    letter-spacing: 10px;
    padding: 22px 60px;
    cursor: pointer;
    transition: all 0.4s;
    overflow: hidden;
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
  }

  .btn-randomize::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--blue-deep) 0%, transparent 30%, transparent 70%, var(--red-deep) 100%);
    opacity: 0; transition: opacity 0.4s;
  }

  .btn-randomize::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(200, 170, 110, 0.06) 50%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .btn-randomize span { position: relative; z-index: 1; }

  .btn-randomize:hover::before { opacity: 1; }
  .btn-randomize:hover {
    border-color: rgba(200, 170, 110, 0.4);
    text-shadow: 0 0 24px rgba(200, 170, 110, 0.5);
    box-shadow: 0 0 60px rgba(0, 180, 255, 0.06), 0 0 60px rgba(255, 45, 85, 0.06);
  }

  .btn-randomize:disabled { opacity: 0.15; cursor: not-allowed; }
  .btn-randomize:disabled::before, .btn-randomize:disabled::after { display: none; }
  .btn-randomize:disabled ~ .btn-ring-outer,
  .btn-randomize:disabled ~ .btn-ring-inner { display: none; }

  .btn-randomize.shuffling {
    animation: shuffleGlitch 0.08s steps(2) infinite;
    border-color: var(--gold);
    text-shadow: 0 0 40px var(--gold);
  }
  @keyframes shuffleGlitch {
    0% { transform: translate(-2px, 1px) skew(-1deg); }
    50% { transform: translate(2px, -1px) skew(1deg); }
    100% { transform: translate(-1px, -1px) skew(-0.5deg); }
  }

  .btn-draft {
    background: transparent;
    border: 1px solid rgba(200, 170, 110, 0.15);
    color: var(--gold);
    font-family: 'Oxanium', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    padding: 10px 28px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
    transition: all 0.3s;
  }
  .btn-draft:hover {
    border-color: var(--gold);
    background: var(--gold-dim);
    box-shadow: 0 0 20px rgba(200, 170, 110, 0.1);
  }
  .btn-draft .draft-sub {
    font-size: 9px; letter-spacing: 2px; opacity: 0.5; font-weight: 400;
  }

  /* ══════════════════════════════════════
     FLASH
     ══════════════════════════════════════ */
  .flash-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; }
  .flash-overlay.fire {
    animation: flashBang 0.8s ease-out forwards;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(0, 180, 255, 0.12), transparent 50%),
      radial-gradient(ellipse at 70% 50%, rgba(255, 45, 85, 0.12), transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(200, 170, 110, 0.1), transparent 40%);
  }
  @keyframes flashBang { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ══════════════════════════════════════
     TEAMS
     ══════════════════════════════════════ */
  .teams-container { display: none; gap: 0; position: relative; }
  .teams-container.visible { display: grid; grid-template-columns: 1fr auto 1fr; }

  .team-card {
    background: var(--surface);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 32px 24px;
    opacity: 0; transform: translateY(40px);
    position: relative; overflow: hidden;
  }

  .team-card.blue {
    clip-path: polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    border-left: 2px solid var(--blue);
    box-shadow: inset 4px 0 40px rgba(0, 180, 255, 0.06), 0 0 60px rgba(0, 180, 255, 0.08);
  }
  .team-card.red {
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
    border-right: 2px solid var(--red);
    box-shadow: inset -4px 0 40px rgba(255, 45, 85, 0.06), 0 0 60px rgba(255, 45, 85, 0.08);
  }

  /* Top glow wash */
  .team-card::before {
    content: ''; position: absolute; top: -2px; left: 0; right: 0; height: 2px;
    pointer-events: none;
  }
  .team-card.blue::before { background: linear-gradient(90deg, var(--blue), transparent 60%); box-shadow: 0 0 20px var(--blue-glow); }
  .team-card.red::before { background: linear-gradient(90deg, transparent 40%, var(--red)); box-shadow: 0 0 20px var(--red-glow); }

  /* Ambient inner glow */
  .team-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 160px;
    pointer-events: none; opacity: 0.4;
  }
  .team-card.blue::after { background: linear-gradient(180deg, rgba(0, 180, 255, 0.05) 0%, transparent 100%); }
  .team-card.red::after { background: linear-gradient(180deg, rgba(255, 45, 85, 0.05) 0%, transparent 100%); }

  .team-card.reveal { animation: cardReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }

  .team-label {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: 8px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
    position: relative; z-index: 1;
  }
  .team-card.blue .team-label { color: var(--blue-hot); }
  .team-card.red .team-label { color: var(--red-hot); }

  .team-label .side-icon {
    width: 6px; height: 6px; transform: rotate(45deg);
  }
  .team-card.blue .side-icon { background: var(--blue); box-shadow: 0 0 8px var(--blue-glow), 0 0 16px var(--blue-glow); }
  .team-card.red .side-icon { background: var(--red); box-shadow: 0 0 8px var(--red-glow), 0 0 16px var(--red-glow); }

  /* ── Member row ── */
  .team-member {
    margin-bottom: 6px; opacity: 0; transform: translateX(-20px);
    position: relative; z-index: 1; transition: background 0.2s;
  }
  .team-member.reveal { animation: memberSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes memberSlideIn { to { opacity: 1; transform: translateX(0); } }

  .team-card.blue .team-member { background: var(--blue-deep); border-left: 2px solid rgba(0, 180, 255, 0.2); }
  .team-card.blue .team-member:hover { background: rgba(0, 180, 255, 0.12); }
  .team-card.red .team-member { background: var(--red-deep); border-left: 2px solid rgba(255, 45, 85, 0.2); }
  .team-card.red .team-member:hover { background: rgba(255, 45, 85, 0.12); }

  .member-header {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    font-weight: 600; font-size: 14px; letter-spacing: 1px;
  }
  .member-number {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 20px; font-weight: 700; opacity: 0.2; min-width: 20px;
  }
  .member-name { flex: 1; }
  .member-name.scrambling { color: var(--text-dim); font-style: italic; }

  .champ-portrait {
    width: 36px; height: 36px; overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08); flex-shrink: 0;
    opacity: 0; transform: scale(0.6);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  }
  .champ-portrait.visible { opacity: 1; transform: scale(1); }
  .champ-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .team-card.blue .champ-portrait { border-color: rgba(0, 180, 255, 0.25); box-shadow: 0 0 10px rgba(0, 180, 255, 0.12); }
  .team-card.red .champ-portrait { border-color: rgba(255, 45, 85, 0.25); box-shadow: 0 0 10px rgba(255, 45, 85, 0.12); }
  .champ-label { font-size: 10px; letter-spacing: 2px; opacity: 0.4; margin-left: auto; text-align: right; white-space: nowrap; text-transform: uppercase; }

  .btn-reroll-champ {
    background: transparent; border: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-dim); font-size: 16px; cursor: pointer;

    flex-shrink: 0; padding: 0; transition: all 0.3s;

    clip-path: polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%);
  }
  .btn-reroll-champ.visible { opacity: 1; transform: scale(1); }
  .btn-reroll-champ:hover { color: var(--gold-hot); border-color: var(--gold); background: var(--gold-dim); }
  .btn-reroll-champ:active { transform: scale(0.9) rotate(180deg); }
  .team-card.blue .btn-reroll-champ:hover { color: var(--blue-hot); border-color: var(--blue); background: var(--blue-deep); }
  .team-card.red .btn-reroll-champ:hover { color: var(--red-hot); border-color: var(--red); background: var(--red-deep); }

  .lane-badge {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 2px; white-space: nowrap; flex-shrink: 0;
    opacity: 0; transform: translateX(8px);
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    clip-path: polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%);
  }
  .lane-badge.visible { opacity: 1; transform: translateX(0); }
  .team-card.blue .lane-badge { background: var(--blue-deep); color: var(--blue-hot); border: 1px solid rgba(0, 180, 255, 0.15); }
  .team-card.red .lane-badge { background: var(--red-deep); color: var(--red-hot); border: 1px solid rgba(255, 45, 85, 0.15); }

  /* ── Build & Runes ── */
  .member-build { padding: 4px 14px 12px 48px; opacity: 0; transition: opacity 0.4s; }
  .member-build.visible { opacity: 1; }
  .build-section-label {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px; margin-top: 8px;
  }
  .build-section-label:first-child { margin-top: 0; }
  .build-items { display: flex; gap: 3px; flex-wrap: wrap; }
  .item-icon {
    width: 28px; height: 28px; overflow: hidden;
    border: 1px solid rgba(200, 170, 110, 0.1);
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
  }
  .item-icon.visible { opacity: 1; transform: scale(1); }
  .item-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-icon:hover { border-color: rgba(200, 170, 110, 0.5); z-index: 10; }
  .item-icon .item-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #060a14; border: 1px solid rgba(200, 170, 110, 0.15);
    padding: 3px 8px; font-size: 10px; white-space: nowrap; color: var(--text);
    pointer-events: none; z-index: 20; margin-bottom: 4px; letter-spacing: 1px;
  }
  .item-icon:hover .item-tooltip { display: block; }
  .rune-icons { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
  .rune-icon {
    width: 22px; height: 22px; border-radius: 50%; overflow: hidden;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .rune-icon.keystone { width: 28px; height: 28px; }
  .rune-icon.visible { opacity: 1; transform: scale(1); }
  .rune-icon img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(1.1); }
  .rune-icon:hover { z-index: 10; }
  .rune-icon .rune-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #060a14; border: 1px solid rgba(200, 170, 110, 0.15);
    padding: 3px 8px; font-size: 10px; white-space: nowrap; color: var(--text);
    pointer-events: none; z-index: 20; margin-bottom: 4px; letter-spacing: 1px;
  }
  .rune-icon:hover .rune-tooltip { display: block; }
  .rune-separator { width: 1px; height: 18px; background: rgba(200, 170, 110, 0.1); margin: 0 3px; }

  /* ── VS ── */
  .vs-divider {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 0 16px; position: relative;
  }
  .vs-line { width: 1px; flex: 1; background: linear-gradient(180deg, transparent, rgba(200, 170, 110, 0.1), transparent); }
  .vs-badge {
    position: relative; width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center; margin: 8px 0;
  }
  .vs-badge::before {
    content: ''; position: absolute; inset: 0;
    border: 1px solid rgba(200, 170, 110, 0.1);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  .vs-text {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-size: 18px; font-weight: 800; letter-spacing: 3px;
    color: var(--text-dim); opacity: 0; transition: opacity 0.6s;
    position: relative; z-index: 1;
  }
  .vs-text.reveal { opacity: 1; }

  .reroll-hint {
    text-align: center; margin-top: 36px;
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--text-dim); opacity: 0; animation: fadeIn 0.5s 1.2s forwards;
    font-family: 'Oxanium', sans-serif;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ══════════════════════════════════════
     RESPONSIVE
     ══════════════════════════════════════ */
  @media (max-width: 680px) {
    .app { padding: 32px 14px 60px; }
    .panel { padding: 24px 18px; }
    .header h1 { letter-spacing: 4px; }
    .header-ghost { display: none; }
    .teams-container.visible { grid-template-columns: 1fr; gap: 0; }
    .vs-divider { flex-direction: row; padding: 12px 0; }
    .vs-line { width: auto; height: 1px; flex: 1; }
    .vs-badge { margin: 0 12px; }
    .btn-randomize { font-size: 22px; padding: 18px 40px; letter-spacing: 6px; }
    .team-card { padding: 24px 16px; }
    .team-card.blue, .team-card.red { clip-path: none; }
    .champ-label { display: none; }
    .member-build { padding-left: 32px; }
    .clash-line { display: none; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="rift"></div>
<div class="scanlines"></div>
<div class="grain"></div>
<div class="clash-line"></div>
<div class="flash-overlay" id="flashOverlay"></div>

<div class="app">
  <header class="header">
    <div class="header-ghost">TR</div>
    <h1>
      <span class="word-team">TEAM</span>
      <span class="word-roulette">ROULETTE</span>
    </h1>
    <p class="tagline">LEAGUE OF LEGENDS</p>
  </header>

  <section class="panel">
    <label class="panel-label">Summoners</label>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter summoner name..." autocomplete="off" maxlength="40" spellcheck="false">
      <button class="btn-add" id="addBtn">ADD</button>
    </div>
    <div class="players-pool" id="playersPool">
      <span class="empty-state" id="emptyState">Awaiting summoners...</span>
    </div>
    <div class="player-count" id="playerCount" style="display:none">
      <span>Players <strong id="countNum">0</strong></span>
      <span>&middot;</span>
      <span id="teamSizeHint"></span>
    </div>
    <div class="save-load-bar">
      <button class="btn-save" id="saveTeamBtn" title="Save current players as a preset">SAVE</button>
      <div class="saved-teams" id="savedTeams"></div>
    </div>
  </section>

  <section class="panel">
    <label class="panel-label">Config</label>
    <div class="options-grid">
      <label class="option-item">
        <input type="checkbox" id="optChampions">
        <div class="checkbox-visual"></div>
        <div>
          <div class="option-label">Assign Champions</div>
          <div class="option-desc">Random champion per player</div>
        </div>
      </label>
      <label class="option-item disabled" id="optBuildWrap">
        <input type="checkbox" id="optBuild" disabled>
        <div class="checkbox-visual"></div>
        <div>
          <div class="option-label">Build + Runes</div>
          <div class="option-desc">Off-meta builds from champion stats</div>
        </div>
      </label>
      <label class="option-item">
        <input type="checkbox" id="optLanes">
        <div class="checkbox-visual"></div>
        <div>
          <div class="option-label">Assign Lanes</div>
          <div class="option-desc">Random role per player (Top/Jg/Mid/Bot/Sup)</div>
        </div>
      </label>
    </div>
    <div class="ban-section" id="banSection" style="display:none">
      <label class="ban-label">Banned Champions</label>
      <div class="ban-input-wrap">
        <input type="text" id="banInput" placeholder="Search champion to ban..." autocomplete="off" spellcheck="false">
        <div class="ban-suggestions" id="banSuggestions"></div>
      </div>
      <div class="ban-pool" id="banPool"></div>
    </div>
    <div class="data-status" id="dataStatus"></div>
  </section>

  <div class="action-bar">
    <div class="btn-randomize-wrap">
      <button class="btn-randomize" id="randomizeBtn" disabled><span>RANDOMIZE</span></button>
      <div class="btn-ring-outer"></div>
      <div class="btn-ring-inner"></div>
    </div>
    <button class="btn-draft" id="draftBtn" title="Generate a random 5-man team for draft">
      <span>⚔ QUICK DRAFT</span>
      <span class="draft-sub">Random 5-man team with lanes</span>
    </button>
  </div>

  <div class="teams-container" id="teamsContainer">
    <div class="team-card blue" id="blueTeam">
      <div class="team-label"><span class="side-icon"></span>BLUE SIDE</div>
      <div class="team-members" id="blueMembers"></div>
    </div>
    <div class="vs-divider">
      <div class="vs-line"></div>
      <div class="vs-badge"><span class="vs-text" id="vsText">VS</span></div>
      <div class="vs-line"></div>
    </div>
    <div class="team-card red" id="redTeam">
      <div class="team-label"><span class="side-icon"></span>RED SIDE</div>
      <div class="team-members" id="redMembers"></div>
    </div>
  </div>

  <div class="reroll-hint" id="rerollHint" style="display:none">Click randomize again to re-roll</div>
</div>

<script>
  // ── Background: animated geometric shards + particle field ──
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Floating hexagonal shards
  class Shard {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 40 + 15;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.003;
      this.speedX = (Math.random() - 0.5) * 0.15;
      this.speedY = (Math.random() - 0.5) * 0.15;
      this.sides = Math.random() > 0.5 ? 6 : 4;
      const r = this.x / canvas.width;
      this.color = r < 0.4 ? [0,180,255] : r > 0.6 ? [255,45,85] : [200,170,110];
      this.opacity = Math.random() * 0.015 + 0.005;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      this.rotation += this.rotSpeed;
      if (this.x < -60 || this.x > canvas.width+60 || this.y < -60 || this.y > canvas.height+60) this.reset();
    }
    draw() {
      const [r,g,b] = this.color;
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.beginPath();
      for (let i = 0; i < this.sides; i++) {
        const angle = (Math.PI * 2 / this.sides) * i - Math.PI / 2;
        const px = Math.cos(angle) * this.size;
        const py = Math.sin(angle) * this.size;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = `rgba(${r},${g},${b},${this.opacity * 2})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.fillStyle = `rgba(${r},${g},${b},${this.opacity})`;
      ctx.fill();
      ctx.restore();
    }
  }

  // Tiny particles
  class Dot {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 1.2 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.2;
      this.speedY = (Math.random() - 0.5) * 0.2;
      this.opacity = Math.random() * 0.25 + 0.05;
      this.pulse = Math.random() * Math.PI * 2;
      const r = this.x / canvas.width;
      this.color = r < 0.35 ? [0,180,255] : r > 0.65 ? [255,45,85] : [200,170,110];
    }
    update(t) {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < -10 || this.x > canvas.width+10 || this.y < -10 || this.y > canvas.height+10) this.reset();
      this.currentOp = this.opacity * (0.5 + Math.sin(t * 0.008 + this.pulse) * 0.5);
    }
    draw() {
      const [r,g,b] = this.color;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.currentOp})`; ctx.fill();
    }
  }

  const shards = Array.from({length: 12}, () => new Shard());
  const dots = Array.from({length: 60}, () => new Dot());
  let frame = 0;

  function animateBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    shards.forEach(s => { s.update(); s.draw(); });
    dots.forEach(d => { d.update(frame); d.draw(); });
    // Connecting lines between nearby dots
    for (let i = 0; i < dots.length; i++) for (let j = i+1; j < dots.length; j++) {
      const dx = dots[i].x - dots[j].x, dy = dots[i].y - dots[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        ctx.beginPath(); ctx.moveTo(dots[i].x, dots[i].y); ctx.lineTo(dots[j].x, dots[j].y);
        ctx.strokeStyle = `rgba(200,170,110,${(1-dist/100)*0.025})`; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
    requestAnimationFrame(animateBg);
  }
  animateBg();

  // ── Data Dragon ──
  let ddragonVersion = '';
  let championList = [];
  let championsLoaded = false;
  let allItems = [];
  let itemsLoaded = false;
  let runesTrees = [];
  let runesLoaded = false;
  let isLoadingData = false;
  let itemPools = { ap: [], ad: [], tank: [], attackSpeed: [], support: [], boots: [] };

  const dataStatus = document.getElementById('dataStatus');
  const optChampions = document.getElementById('optChampions');
  const optBuild = document.getElementById('optBuild');
  const optBuildWrap = document.getElementById('optBuildWrap');

  function updateDataStatus(text, isError) {
    dataStatus.classList.add('visible');
    dataStatus.classList.toggle('error', !!isError);
    dataStatus.innerHTML = text;
  }

  async function loadAllData() {
    if (isLoadingData) return;
    isLoadingData = true;
    updateDataStatus('Loading game data...');
    try {
      const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
      const versions = await vRes.json();
      ddragonVersion = versions[0];
      const [champRes, itemRes, runeRes] = await Promise.all([
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/champion.json`),
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/item.json`),
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/runesReforged.json`)
      ]);
      const champData = await champRes.json();
      const itemData = await itemRes.json();
      runesTrees = await runeRes.json();
      runesLoaded = true;
      championList = Object.values(champData.data).map(c => ({ id: c.id, name: c.name, image: c.image.full, tags: c.tags }));
      championsLoaded = true;
      const rawItems = Object.entries(itemData.data);
      allItems = rawItems.filter(([id, item]) => {
        if (!item.gold || !item.gold.purchasable) return false;
        if (item.maps && !item.maps['11']) return false;
        if (item.requiredChampion) return false;
        return true;
      }).map(([id, item]) => ({
        id, name: item.name, image: item.image.full, gold: item.gold.total,
        tags: item.tags || [], stats: item.stats || {}, into: item.into, from: item.from,
        description: item.description || ''
      }));
      const finishedItems = allItems.filter(i => i.gold >= 2500 && (!i.into || i.into.length === 0));
      const boots = allItems.filter(i => i.tags.includes('Boots') && i.gold >= 900 && i.gold <= 1600 && (!i.into || i.into.length === 0));
      itemPools.boots = boots;
      finishedItems.forEach(item => {
        const s = item.stats; const desc = item.description.toLowerCase();
        if (s.FlatMagicDamageMod > 0 || desc.includes('ability power')) itemPools.ap.push(item);
        if (s.FlatPhysicalDamageMod > 0 || desc.includes('attack damage') || s.FlatCritChanceMod > 0 || desc.includes('critical')) itemPools.ad.push(item);
        if (s.PercentAttackSpeedMod > 0 || desc.includes('attack speed') || s.FlatCritChanceMod > 0) itemPools.attackSpeed.push(item);
        if (s.FlatArmorMod > 0 || s.FlatSpellBlockMod > 0 || s.FlatHPPoolMod > 200) itemPools.tank.push(item);
        if (s.FlatMagicDamageMod > 0 || s.FlatHPPoolMod > 0 || desc.includes('heal') || desc.includes('shield')) itemPools.support.push(item);
      });
      for (const key of Object.keys(itemPools)) {
        if (key !== 'boots' && itemPools[key].length < 5) itemPools[key] = finishedItems.slice(0, 30);
      }
      if (itemPools.boots.length === 0) itemPools.boots = allItems.filter(i => i.tags.includes('Boots')).slice(0, 5);
      itemsLoaded = true;
      updateDataStatus(`<span class="count">${championList.length}</span> champs &middot; <span class="count">${finishedItems.length}</span> items &middot; <span class="count">${runesTrees.length}</span> rune trees &middot; patch ${ddragonVersion}`);
    } catch (err) {
      updateDataStatus('Failed to load — check connection', true);
      isLoadingData = false;
    }
  }

  const banSection = document.getElementById('banSection');

  function addBan(champion) {
    if (bannedChampions.has(champion.id)) return;

  optBuild.addEventListener('change', () => { if (optBuild.checked) loadAllData(); });

  function getIconUrl(type, imageFile) { return `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/${type}/${imageFile}`; }

  function classifyChampion(champion) {
    const t = champion.tags;
    if (t.includes('Marksman')) return 'adc';
    if (t.includes('Assassin') && t.includes('Mage')) return 'ap_assassin';
    if (t.includes('Assassin')) return 'ad_assassin';
    if (t.includes('Mage')) return 'mage';
    if (t.includes('Tank')) return 'tank';
    if (t.includes('Fighter')) return 'bruiser';
    if (t.includes('Support')) return 'support';
    return 'bruiser';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  function pickUnique(pool, count, exclude) {
    return shuffle(pool.filter(i => !exclude.has(i.id))).slice(0, count);
  }

  function generateBuild(champion) {
    const archetype = classifyChampion(champion);
    const used = new Set(); const items = [];
    const boot = shuffle(itemPools.boots)[0];
    if (boot) { items.push(boot); used.add(boot.id); }
    const configs = {
      mage: { primary: 'ap', pCount: 3, offmeta: ['tank','ad','support'] },
      ap_assassin: { primary: 'ap', pCount: 3, offmeta: ['ad','attackSpeed','tank'] },
      ad_assassin: { primary: 'ad', pCount: 3, offmeta: ['ap','tank','attackSpeed'] },
      adc: { primary: 'attackSpeed', pCount: 2, offmeta: ['ap','tank','ad'] },
      tank: { primary: 'tank', pCount: 3, offmeta: ['ap','ad','support'] },
      bruiser: { primary: 'ad', pCount: 2, offmeta: ['tank','ap','attackSpeed'] },
      support: { primary: 'support', pCount: 3, offmeta: ['ap','tank','ad'] },
    };
    const c = configs[archetype] || configs.bruiser;
    pickUnique(itemPools[c.primary], c.pCount, used).forEach(i => { items.push(i); used.add(i.id); });
    for (const p of shuffle(c.offmeta)) {
      if (items.length >= 6) break;
      pickUnique(itemPools[p], Math.min(6 - items.length, 2), used).forEach(i => { items.push(i); used.add(i.id); });
    }
    if (items.length < 6) {
      pickUnique([...itemPools.ap,...itemPools.ad,...itemPools.tank,...itemPools.attackSpeed], 6-items.length, used).forEach(i => items.push(i));
    }
    return items.slice(0, 6);
  }

  function generateRunes(champion) {
    const archetype = classifyChampion(champion);
    const prefs = { mage:['Sorcery','Domination'], ap_assassin:['Domination','Sorcery'], ad_assassin:['Domination','Precision'], adc:['Precision','Domination'], tank:['Resolve','Inspiration'], bruiser:['Precision','Resolve'], support:['Resolve','Inspiration'] };
    const p = prefs[archetype] || ['Precision','Domination'];
    const usePref = Math.random() < 0.5;
    const primaryTree = runesTrees.find(t => t.name === (usePref ? p[0] : shuffle(runesTrees.map(t=>t.name))[0])) || runesTrees[0];
    const secOpts = runesTrees.filter(t => t.name !== primaryTree.name);
    const secondaryTree = usePref ? (secOpts.find(t => t.name === p[1]) || shuffle(secOpts)[0]) : shuffle(secOpts)[0];
    const runes = [];
    if (primaryTree.slots && primaryTree.slots.length >= 4) {
      runes.push({ ...shuffle(primaryTree.slots[0].runes)[0], isKeystone: true, tree: primaryTree.name });
      for (let s = 1; s < Math.min(primaryTree.slots.length, 4); s++) runes.push({ ...shuffle(primaryTree.slots[s].runes)[0], tree: primaryTree.name });
    }
    if (secondaryTree.slots && secondaryTree.slots.length >= 4) {
      for (const s of shuffle([1,2,3]).slice(0,2)) {
        if (s < secondaryTree.slots.length) runes.push({ ...shuffle(secondaryTree.slots[s].runes)[0], tree: secondaryTree.name, isSecondary: true });
      }
    }
    return { runes, primaryTree: primaryTree.name, secondaryTree: secondaryTree.name };
  }

  function addPlayer(name) {
    const trimmed = name.trim();

  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz0123456789';
  function scrambleReveal(el, finalText, duration = 600) {
    const steps = 8, interval = duration / steps; let step = 0;
    el.classList.add('scrambling');
    const timer = setInterval(() => {
      step++;
      if (step >= steps) { clearInterval(timer); el.textContent = finalText; el.classList.remove('scrambling'); return; }
      const rc = Math.floor((step / steps) * finalText.length);
      let d = finalText.substring(0, rc);
      for (let i = rc; i < finalText.length; i++) d += CHARS[Math.floor(Math.random() * CHARS.length)];
      el.textContent = d;
    }, interval);
  }

  const LANES = ['Top', 'Jungle', 'Mid', 'Bot', 'Support'];
  const optLanes = document.getElementById('optLanes');

  function createMemberEl(index, playerName, champion, build, runeData, delay, lane) {

          ir.appendChild(iw); setTimeout(() => iw.classList.add('visible'), delay + 700 + i * 80);
        });
        buildSection.appendChild(ir);

      if (runeData && runeData.runes.length > 0) {

        const rr = document.createElement('div'); rr.className = 'rune-icons'; let addedP = false;
        runeData.runes.forEach((rune, i) => {

          const img = document.createElement('img'); img.src = `https://ddragon.leagueoflegends.com/cdn/img/${rune.icon}`; img.alt = rune.name; img.loading = 'lazy'; iw.appendChild(img);
          const tt = document.createElement('div'); tt.className = 'rune-tooltip'; tt.textContent = rune.name; iw.appendChild(tt);
          rr.appendChild(iw); setTimeout(() => iw.classList.add('visible'), delay + 1100 + i * 80);

  function assignLanes(count) {
    if (!optLanes.checked) return Array(count).fill(null);
    const lanes = shuffle([...LANES]);
    if (count <= 5) return lanes.slice(0, count);
    const extra = [];
    for (let i = 5; i < count; i++) extra.push(LANES[Math.floor(Math.random() * LANES.length)]);
    return [...lanes, ...extra];
  }

  function renderTeams(blue, red, blueData, redData) {
    blueMembers.innerHTML = ''; redMembers.innerHTML = '';
    const maxLen = Math.max(blue.length, red.length);
    const useC = optChampions.checked && championsLoaded, useB = optBuild.checked && itemsLoaded && runesLoaded;
    const blueLanes = assignLanes(blue.length), redLanes = assignLanes(red.length);
    const allChamps = [], allElements = [];
    for (let i = 0; i < maxLen; i++) {
      if (i < blue.length) {
        const c = useC && blueData ? blueData[i].champion : null, b = useB && blueData ? blueData[i].build : null, r = useB && blueData ? blueData[i].runes : null;
        const el = createMemberEl(i, blue[i], c, b, r, 200 + i * 300, blueLanes[i]);
        blueMembers.appendChild(el);
        if (c) { allChamps.push(c); allElements.push(el); }
      }
      if (i < red.length) {
        const c = useC && redData ? redData[i].champion : null, b = useB && redData ? redData[i].build : null, r = useB && redData ? redData[i].runes : null;
        const el = createMemberEl(i, red[i], c, b, r, 350 + i * 300, redLanes[i]);
        redMembers.appendChild(el);
        if (c) { allChamps.push(c); allElements.push(el); }
      }
    }
    if (allChamps.length > 0) {
      currentAssignment = { champs: allChamps, elements: allElements, useB };
    }
  }

  // Track current assignment so bans can live-swap
  let currentAssignment = null; // { champs: [], elements: [], useB: bool }

  function liveReplaceBanned(bannedId) {
    if (!currentAssignment) return;
    const { champs, elements, useB } = currentAssignment;
    const usedIds = new Set(champs.map(c => c.id));
    for (let i = 0; i < champs.length; i++) {
      if (champs[i].id === bannedId) {
        const replacement = shuffle(championList.filter(c => !bannedChampions.has(c.id) && !usedIds.has(c.id)))[0];
        if (!replacement) continue;
        champs[i] = replacement;
        usedIds.add(replacement.id);
        // Update the DOM element in-place
        const el = elements[i];
        if (!el) continue;
        const header = el.querySelector('.member-header');
        // Update portrait
        const portrait = header.querySelector('.champ-portrait img');
        if (portrait) {
          portrait.src = getIconUrl('champion', replacement.image);
          portrait.alt = replacement.name;
          portrait.parentElement.classList.remove('visible');
          void portrait.offsetWidth;
          portrait.parentElement.classList.add('visible');
        }
        // Update champ label
        const label = header.querySelector('.champ-label');
        if (label) { label.textContent = replacement.name; }
        // Update build if active
        if (useB) {
          const oldBuild = el.querySelector('.member-build');
          if (oldBuild) oldBuild.remove();
          const build = generateBuild(replacement);
          const runes = generateRunes(replacement);
          const buildSection = document.createElement('div'); buildSection.className = 'member-build visible';
          const il = document.createElement('div'); il.className = 'build-section-label'; il.textContent = 'BUILD'; buildSection.appendChild(il);
          const ir = document.createElement('div'); ir.className = 'build-items';
          build.forEach((item, j) => {
            const iw = document.createElement('div'); iw.className = 'item-icon visible';
            const img = document.createElement('img'); img.src = getIconUrl('item', item.image); img.alt = item.name; img.loading = 'lazy'; iw.appendChild(img);
            const tt = document.createElement('div'); tt.className = 'item-tooltip'; tt.textContent = item.name; iw.appendChild(tt);
            ir.appendChild(iw);
          });
          buildSection.appendChild(ir);
          const rl = document.createElement('div'); rl.className = 'build-section-label'; rl.textContent = 'RUNES'; buildSection.appendChild(rl);
          const rr = document.createElement('div'); rr.className = 'rune-icons'; let addedP = false;
          runes.runes.forEach((rune) => {
            if (rune.isSecondary && !addedP) { addedP = true; const sep = document.createElement('div'); sep.className = 'rune-separator'; rr.appendChild(sep); }
            const iw = document.createElement('div'); iw.className = 'rune-icon visible' + (rune.isKeystone ? ' keystone' : '');
            const img = document.createElement('img'); img.src = `https://ddragon.leagueoflegends.com/cdn/img/${rune.icon}`; img.alt = rune.name; img.loading = 'lazy'; iw.appendChild(img);
            const tt = document.createElement('div'); tt.className = 'rune-tooltip'; tt.textContent = rune.name; iw.appendChild(tt);
            rr.appendChild(iw);
          });
          buildSection.appendChild(rr);
          el.appendChild(buildSection);
        }
        // Flash effect on the swapped row
        el.style.transition = 'none'; el.style.background = 'rgba(255, 45, 85, 0.2)';
        void el.offsetWidth;
        el.style.transition = 'background 1s'; el.style.background = '';
      }
    }
  }

  function rerollSingleChamp(el, index) {
    if (!currentAssignment) return;
    const { champs, useB } = currentAssignment;
    if (!champs[index]) return;
    const usedIds = new Set(champs.map(c => c.id));
    const replacement = shuffle(championList.filter(c => !bannedChampions.has(c.id) && !usedIds.has(c.id)))[0];
    if (!replacement) return;
    champs[index] = replacement;
    // Update portrait
    const header = el.querySelector('.member-header');
    const portrait = header.querySelector('.champ-portrait img');
    if (portrait) {
      portrait.src = getIconUrl('champion', replacement.image);
      portrait.alt = replacement.name;
      portrait.parentElement.style.transition = 'none'; portrait.parentElement.style.transform = 'scale(0.6)'; portrait.parentElement.style.opacity = '0';
      void portrait.offsetWidth;
      portrait.parentElement.style.transition = 'opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      portrait.parentElement.style.transform = 'scale(1)'; portrait.parentElement.style.opacity = '1';
    }
    // Update label
    const label = header.querySelector('.champ-label');
    if (label) label.textContent = replacement.name;
    // Update build + runes
    if (useB) {
      const oldBuild = el.querySelector('.member-build');
      if (oldBuild) oldBuild.remove();
      const build = generateBuild(replacement);
      const runes = generateRunes(replacement);
      const buildSection = document.createElement('div'); buildSection.className = 'member-build visible';
      const il = document.createElement('div'); il.className = 'build-section-label'; il.textContent = 'BUILD'; buildSection.appendChild(il);
      const ir = document.createElement('div'); ir.className = 'build-items';
      build.forEach((item) => {
        const iw = document.createElement('div'); iw.className = 'item-icon visible';
        const img = document.createElement('img'); img.src = getIconUrl('item', item.image); img.alt = item.name; img.loading = 'lazy'; iw.appendChild(img);
        const tt = document.createElement('div'); tt.className = 'item-tooltip'; tt.textContent = item.name; iw.appendChild(tt);
        ir.appendChild(iw);
      });
      buildSection.appendChild(ir);
      const rl = document.createElement('div'); rl.className = 'build-section-label'; rl.textContent = 'RUNES'; buildSection.appendChild(rl);
      const rr = document.createElement('div'); rr.className = 'rune-icons'; let addedP = false;
      runes.runes.forEach((rune) => {
        if (rune.isSecondary && !addedP) { addedP = true; const sep = document.createElement('div'); sep.className = 'rune-separator'; rr.appendChild(sep); }
        const iw = document.createElement('div'); iw.className = 'rune-icon visible' + (rune.isKeystone ? ' keystone' : '');
        const img = document.createElement('img'); img.src = `https://ddragon.leagueoflegends.com/cdn/img/${rune.icon}`; img.alt = rune.name; img.loading = 'lazy'; iw.appendChild(img);
        const tt = document.createElement('div'); tt.className = 'rune-tooltip'; tt.textContent = rune.name; iw.appendChild(tt);
        rr.appendChild(iw);
      });
      buildSection.appendChild(rr);
      el.appendChild(buildSection);
    }
    // Flash
    el.style.transition = 'none'; el.style.background = 'rgba(200, 170, 110, 0.15)';
    void el.offsetWidth;
    el.style.transition = 'background 0.8s'; el.style.background = '';
  }

  randomizeBtn.addEventListener('click', () => {
    if (players.length < 2) return;
    teamsContainer.classList.remove('visible'); blueTeam.classList.remove('reveal'); redTeam.classList.remove('reveal');
    vsText.classList.remove('reveal'); rerollHint.style.display = 'none';
    randomizeBtn.classList.add('shuffling'); randomizeBtn.disabled = true;
    setTimeout(() => {
      randomizeBtn.classList.remove('shuffling'); randomizeBtn.disabled = false;
      flashOverlay.classList.remove('fire'); void flashOverlay.offsetWidth; flashOverlay.classList.add('fire');
      const shuffled = shuffle(players), half = Math.floor(shuffled.length / 2);
      const blueArr = shuffled.slice(0, half), redArr = shuffled.slice(half);
      let blueData = null, redData = null;
      if (optChampions.checked && championsLoaded) {
        const champs = shuffle(championList).slice(0, shuffled.length);

        const useB = optBuild.checked && itemsLoaded && runesLoaded;
        blueData = blueArr.map((_, i) => ({ champion: champs[i], build: useB ? generateBuild(champs[i]) : null, runes: useB ? generateRunes(champs[i]) : null }));
        redData = redArr.map((_, i) => ({ champion: champs[half+i], build: useB ? generateBuild(champs[half+i]) : null, runes: useB ? generateRunes(champs[half+i]) : null }));
      }
      teamsContainer.classList.add('visible');
      setTimeout(() => blueTeam.classList.add('reveal'), 50);
      setTimeout(() => vsText.classList.add('reveal'), 200);
      setTimeout(() => redTeam.classList.add('reveal'), 300);
      renderTeams(blueArr, redArr, blueData, redData);
      rerollHint.style.display = 'block'; rerollHint.style.animation = 'none';
      void rerollHint.offsetWidth; rerollHint.style.animation = 'fadeIn 0.5s 1.5s forwards'; rerollHint.style.opacity = '0';
    }, 700);
  });

  // ── Quick Draft: generate a random 5-man team with lanes, champions, builds ──
  const draftBtn = document.getElementById('draftBtn');
  draftBtn.addEventListener('click', () => {
    // Force lanes on for draft
    optLanes.checked = true;

    // Use entered names, or fall back to "Player N"
    const draftCount = players.length >= 2 ? players.length : 5;
    const draftNames = players.length >= 2 ? shuffle([...players]) : Array.from({length: 5}, (_, i) => 'Player ' + (i + 1));

    teamsContainer.classList.remove('visible'); blueTeam.classList.remove('reveal'); redTeam.classList.remove('reveal');
    vsText.classList.remove('reveal'); rerollHint.style.display = 'none';
    draftBtn.style.pointerEvents = 'none'; draftBtn.style.opacity = '0.3';

    setTimeout(() => {
      draftBtn.style.pointerEvents = ''; draftBtn.style.opacity = '';
      flashOverlay.classList.remove('fire'); void flashOverlay.offsetWidth; flashOverlay.classList.add('fire');

      let blueData = null;
      if (championsLoaded) {
        optChampions.checked = true;
        const champs = shuffle(championList).slice(0, draftCount);

        const useB = optBuild.checked && itemsLoaded && runesLoaded;
        blueData = draftNames.map((_, i) => ({
          champion: champs[i],
          build: useB ? generateBuild(champs[i]) : null,
          runes: useB ? generateRunes(champs[i]) : null
        }));
      }

      // Only show blue side as "YOUR TEAM"
      teamsContainer.classList.add('visible');
      document.querySelector('#blueTeam .team-label').textContent = 'YOUR DRAFT';
      setTimeout(() => blueTeam.classList.add('reveal'), 50);

      blueMembers.innerHTML = '';
      const lanes = assignLanes(draftCount);
      const draftChamps = [], draftElements = [];
      const draftUseB = blueData ? (optBuild.checked && itemsLoaded && runesLoaded) : false;
      for (let i = 0; i < draftNames.length; i++) {
        const c = blueData ? blueData[i].champion : null;
        const b = blueData ? blueData[i].build : null;
        const r = blueData ? blueData[i].runes : null;
        const el = createMemberEl(i, draftNames[i], c, b, r, 200 + i * 300, lanes[i]);
        blueMembers.appendChild(el);
        if (c) { draftChamps.push(c); draftElements.push(el); }
      }
      if (draftChamps.length > 0) {
        currentAssignment = { champs: draftChamps, elements: draftElements, useB: draftUseB };
      }

      // Hide red side and VS for draft mode
      redTeam.style.display = 'none';
      document.querySelector('.vs-divider').style.display = 'none';

      rerollHint.style.display = 'block'; rerollHint.style.animation = 'none';
      void rerollHint.offsetWidth; rerollHint.style.animation = 'fadeIn 0.5s 1.5s forwards'; rerollHint.style.opacity = '0';
    }, 700);
  });

  // Reset red side visibility when doing normal randomize
  randomizeBtn.addEventListener('click', function resetRedSide() {
    redTeam.style.display = '';
    document.querySelector('.vs-divider').style.display = '';
    document.querySelector('#blueTeam .team-label').innerHTML = '<span class="side-icon"></span>BLUE SIDE';
  }, true);

  updateUI();
</script>
</body>
</html>
