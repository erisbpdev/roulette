<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Roulette — LoL Custom Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06080d;
    --surface: rgba(12, 17, 28, 0.85);
    --border: rgba(200, 170, 110, 0.08);
    --text: #ddd8cc;
    --text-dim: #5a5549;
    --blue: #0ea5e9;
    --blue-bright: #38bdf8;
    --blue-glow: rgba(14, 165, 233, 0.35);
    --red: #f43f5e;
    --red-bright: #fb7185;
    --red-glow: rgba(244, 63, 94, 0.35);
    --gold: #c8aa6e;
    --gold-bright: #e4cc91;
    --gold-dim: rgba(200, 170, 110, 0.12);
  }

  html { height: 100%; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    cursor: default;
  }

  #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  .ambient-split { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .ambient-split::before {
    content: ''; position: absolute; top: -20%; left: -30%; width: 80%; height: 140%;
    background: radial-gradient(ellipse at center, rgba(14, 165, 233, 0.04) 0%, transparent 70%);
    transform: rotate(-15deg);
  }
  .ambient-split::after {
    content: ''; position: absolute; top: -20%; right: -30%; width: 80%; height: 140%;
    background: radial-gradient(ellipse at center, rgba(244, 63, 94, 0.04) 0%, transparent 70%);
    transform: rotate(15deg);
  }

  .app { position: relative; z-index: 2; max-width: 960px; margin: 0 auto; padding: 48px 28px 80px; }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 56px; position: relative; }

  .header-decor {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 320px; height: 320px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 170, 110, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .header h1 {
    font-family: 'Teko', sans-serif; font-weight: 700;
    font-size: clamp(56px, 10vw, 100px); letter-spacing: 12px; line-height: 0.9;
    position: relative; color: transparent;
    background: linear-gradient(175deg, #f5e6c8 0%, var(--gold) 40%, #8a6d3b 100%);
    -webkit-background-clip: text; background-clip: text;
    filter: drop-shadow(0 0 40px rgba(200, 170, 110, 0.15));
  }
  .header h1::after {
    content: 'TEAM ROULETTE'; position: absolute; inset: 0; color: transparent;
    background: linear-gradient(175deg, rgba(245, 230, 200, 0.1) 0%, transparent 50%);
    -webkit-background-clip: text; background-clip: text; filter: blur(12px); z-index: -1;
  }
  .header .subtitle {
    font-size: 13px; font-weight: 600; letter-spacing: 6px;
    text-transform: uppercase; color: var(--text-dim); margin-top: 10px;
  }
  .header-line { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 24px; }
  .header-line span { height: 1px; width: 60px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .header-line .diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); opacity: 0.6; }

  /* ── Panels ── */
  .panel {
    background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 2px; padding: 36px; margin-bottom: 20px; position: relative;
  }
  .panel::before, .panel::after {
    content: ''; position: absolute; width: 20px; height: 20px;
    border-color: rgba(200, 170, 110, 0.2); border-style: solid;
  }
  .panel::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .panel::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .panel-label {
    display: block; font-family: 'Teko', sans-serif; font-size: 16px; font-weight: 500;
    letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px;
  }

  /* ── Input ── */
  .input-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .input-row input {
    flex: 1; background: rgba(6, 8, 13, 0.6); border: 1px solid rgba(200, 170, 110, 0.1);
    border-radius: 2px; padding: 14px 20px; color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600;
    outline: none; transition: all 0.3s; letter-spacing: 1px;
  }
  .input-row input::placeholder { color: var(--text-dim); font-weight: 400; letter-spacing: 1px; }
  .input-row input:focus {
    border-color: rgba(200, 170, 110, 0.35);
    box-shadow: 0 0 0 3px var(--gold-dim), inset 0 0 20px rgba(200, 170, 110, 0.03);
  }
  .btn-add {
    background: transparent; border: 1px solid rgba(200, 170, 110, 0.25); color: var(--gold);
    font-family: 'Teko', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: 3px;
    padding: 0 32px; border-radius: 2px; cursor: pointer; transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .btn-add::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200, 170, 110, 0.1), rgba(200, 170, 110, 0.05));
    opacity: 0; transition: opacity 0.25s;
  }
  .btn-add:hover::before { opacity: 1; }
  .btn-add:hover { border-color: rgba(200, 170, 110, 0.5); text-shadow: 0 0 12px rgba(200, 170, 110, 0.4); }
  .btn-add:active { transform: scale(0.97); }

  /* ── Player Tags ── */
  .players-pool { display: flex; flex-wrap: wrap; gap: 10px; min-height: 44px; }
  .player-tag {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(200, 170, 110, 0.04); border: 1px solid rgba(200, 170, 110, 0.12);
    border-radius: 2px; padding: 8px 16px; font-size: 14px; font-weight: 600;
    letter-spacing: 1px; animation: tagIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
  }
  .player-tag::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); opacity: 0.4; }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .player-tag .tag-name { color: var(--gold-bright); }
  .player-tag .remove {
    width: 16px; height: 16px; border: none; background: transparent;
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: color 0.2s;
  }
  .player-tag .remove:hover { color: var(--red); }
  .empty-state { color: var(--text-dim); font-size: 14px; padding: 8px 0; letter-spacing: 1px; }
  .player-count {
    display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
    color: var(--text-dim); margin-top: 20px; padding-top: 20px;
    border-top: 1px solid var(--border); width: 100%; letter-spacing: 1px;
  }
  .player-count strong { color: var(--gold); font-size: 15px; font-family: 'Teko', sans-serif; font-weight: 600; }

  /* ── Options ── */
  .options-grid { display: flex; flex-wrap: wrap; gap: 12px 36px; }
  .option-item { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; user-select: none; padding: 6px 0; }
  .option-item input[type="checkbox"] { display: none; }
  .checkbox-visual {
    width: 20px; height: 20px; border: 1px solid rgba(200, 170, 110, 0.2); border-radius: 2px;
    display: flex; align-items: center; justify-content: center; transition: all 0.25s;
    flex-shrink: 0; margin-top: 2px;
  }
  .checkbox-visual::after {
    content: ''; width: 10px; height: 10px; background: var(--gold); border-radius: 1px;
    transform: scale(0); transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .option-item input:checked + .checkbox-visual { border-color: var(--gold); box-shadow: 0 0 8px var(--gold-dim); }
  .option-item input:checked + .checkbox-visual::after { transform: scale(1); }
  .option-item:hover .checkbox-visual { border-color: rgba(200, 170, 110, 0.4); }
  .option-item.disabled { opacity: 0.3; pointer-events: none; }
  .option-label { font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--text); }
  .option-desc { font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; margin-top: 2px; }
  .data-status {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--border); color: var(--text-dim); display: none;
  }
  .data-status.visible { display: block; }
  .data-status .count { color: var(--gold); font-family: 'Teko', sans-serif; font-size: 14px; }
  .data-status.error { color: var(--red); }

  /* ── Button ── */
  .action-bar { display: flex; justify-content: center; margin-bottom: 56px; margin-top: 16px; }
  .btn-randomize-wrap { position: relative; display: inline-block; }
  .btn-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(200, 170, 110, 0.08); pointer-events: none;
    animation: ringPulse 3s ease-in-out infinite;
  }
  @keyframes ringPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.04); opacity: 1; } }
  .btn-randomize {
    position: relative; background: transparent; border: 1px solid rgba(200, 170, 110, 0.2);
    color: var(--gold-bright); font-family: 'Teko', sans-serif; font-size: 32px; font-weight: 600;
    letter-spacing: 8px; padding: 20px 64px; border-radius: 2px; cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; z-index: 1;
  }
  .btn-randomize::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(14, 165, 233, 0.15) 0%, rgba(200, 170, 110, 0.08) 50%, rgba(244, 63, 94, 0.15) 100%);
    opacity: 0; transition: opacity 0.4s;
  }
  .btn-randomize::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
    background: radial-gradient(circle, rgba(200, 170, 110, 0.2), transparent 70%);
    border-radius: 50%; transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; z-index: -1;
  }
  .btn-randomize:hover::before { opacity: 1; }
  .btn-randomize:hover::after { width: 300px; height: 300px; }
  .btn-randomize:hover {
    border-color: rgba(200, 170, 110, 0.5); text-shadow: 0 0 20px rgba(200, 170, 110, 0.4);
    box-shadow: 0 0 40px rgba(14, 165, 233, 0.08), 0 0 40px rgba(244, 63, 94, 0.08), 0 0 80px rgba(200, 170, 110, 0.05);
    transform: translateY(-2px);
  }
  .btn-randomize span { position: relative; z-index: 1; }
  .btn-randomize:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; border-color: rgba(200, 170, 110, 0.08); }
  .btn-randomize:disabled::before, .btn-randomize:disabled::after { display: none; }
  .btn-randomize:disabled ~ .btn-ring { display: none; }
  .btn-randomize.shuffling {
    animation: shufflePulse 0.12s infinite alternate;
    border-color: rgba(200, 170, 110, 0.6); text-shadow: 0 0 30px rgba(200, 170, 110, 0.6);
  }
  @keyframes shufflePulse {
    from { transform: translateX(-1px) skewX(-0.5deg); }
    to { transform: translateX(1px) skewX(0.5deg); }
  }

  /* ── Flash ── */
  .flash-overlay { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0; }
  .flash-overlay.fire {
    animation: flashBang 0.6s ease-out forwards;
    background: radial-gradient(circle at 50% 50%, rgba(200, 170, 110, 0.15), transparent 70%);
  }
  @keyframes flashBang { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* ── Teams ── */
  .teams-container { display: none; gap: 0; margin-top: 16px; position: relative; }
  .teams-container.visible { display: grid; grid-template-columns: 1fr auto 1fr; }
  .team-card {
    background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 2px; padding: 36px 24px; border: 1px solid var(--border);
    opacity: 0; transform: translateY(30px); position: relative; overflow: hidden;
  }
  .team-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 120px;
    pointer-events: none; opacity: 0.5;
  }
  .team-card.blue::before { background: linear-gradient(180deg, rgba(14, 165, 233, 0.06) 0%, transparent 100%); }
  .team-card.red::before { background: linear-gradient(180deg, rgba(244, 63, 94, 0.06) 0%, transparent 100%); }
  .team-card.reveal { animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }
  .team-card.blue { border-top: 2px solid var(--blue); box-shadow: 0 -2px 40px var(--blue-glow), inset 0 1px 0 rgba(14, 165, 233, 0.1); }
  .team-card.red { border-top: 2px solid var(--red); box-shadow: 0 -2px 40px var(--red-glow), inset 0 1px 0 rgba(244, 63, 94, 0.1); }
  .team-label {
    font-family: 'Teko', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: 6px;
    margin-bottom: 24px; display: flex; align-items: center; gap: 14px; position: relative; z-index: 1;
  }
  .team-card.blue .team-label { color: var(--blue-bright); }
  .team-card.red .team-label { color: var(--red-bright); }
  .team-label .side-icon { width: 8px; height: 8px; transform: rotate(45deg); }
  .team-card.blue .side-icon { background: var(--blue); box-shadow: 0 0 10px var(--blue-glow), 0 0 20px var(--blue-glow); }
  .team-card.red .side-icon { background: var(--red); box-shadow: 0 0 10px var(--red-glow), 0 0 20px var(--red-glow); }

  /* ── Member row ── */
  .team-member {
    border-radius: 2px; margin-bottom: 8px; opacity: 0; transform: translateX(-16px);
    position: relative; z-index: 1; transition: background 0.2s;
  }
  .team-member:hover { background: rgba(255, 255, 255, 0.02); }
  .team-member.reveal { animation: memberSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes memberSlideIn { to { opacity: 1; transform: translateX(0); } }
  .team-card.blue .team-member { background: rgba(14, 165, 233, 0.04); border-left: 2px solid rgba(14, 165, 233, 0.25); }
  .team-card.blue .team-member:hover { background: rgba(14, 165, 233, 0.08); }
  .team-card.red .team-member { background: rgba(244, 63, 94, 0.04); border-left: 2px solid rgba(244, 63, 94, 0.25); }
  .team-card.red .team-member:hover { background: rgba(244, 63, 94, 0.08); }

  .member-header {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    font-weight: 600; font-size: 15px; letter-spacing: 1px;
  }
  .member-number { font-family: 'Teko', sans-serif; font-size: 22px; font-weight: 400; opacity: 0.25; min-width: 20px; }
  .member-name { flex: 1; }
  .member-name.scrambling { color: var(--text-dim); font-style: italic; }

  /* ── Champion portrait ── */
  .champ-portrait {
    width: 36px; height: 36px; border-radius: 2px; overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1); flex-shrink: 0;
    opacity: 0; transform: scale(0.7);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .champ-portrait.visible { opacity: 1; transform: scale(1); }
  .champ-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .team-card.blue .champ-portrait { border-color: rgba(14, 165, 233, 0.3); box-shadow: 0 0 8px rgba(14, 165, 233, 0.15); }
  .team-card.red .champ-portrait { border-color: rgba(244, 63, 94, 0.3); box-shadow: 0 0 8px rgba(244, 63, 94, 0.15); }
  .champ-label { font-size: 11px; letter-spacing: 1px; opacity: 0.5; margin-left: auto; text-align: right; white-space: nowrap; }

  /* ── Build & Runes row ── */
  .member-build {
    padding: 6px 14px 12px 48px;
    opacity: 0; transition: opacity 0.4s;
  }
  .member-build.visible { opacity: 1; }

  .build-section-label {
    font-family: 'Teko', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 6px; margin-top: 8px;
  }
  .build-section-label:first-child { margin-top: 0; }

  .build-items {
    display: flex; gap: 4px; flex-wrap: wrap;
  }

  .item-icon {
    width: 30px; height: 30px; border-radius: 2px; overflow: hidden;
    border: 1px solid rgba(200, 170, 110, 0.15);
    opacity: 0; transform: scale(0.6);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .item-icon.visible { opacity: 1; transform: scale(1); }
  .item-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-icon:hover { border-color: rgba(200, 170, 110, 0.5); z-index: 10; }

  .item-icon .item-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #0c111c; border: 1px solid rgba(200, 170, 110, 0.2); border-radius: 2px;
    padding: 4px 8px; font-size: 11px; white-space: nowrap; color: var(--text);
    pointer-events: none; z-index: 20; margin-bottom: 4px;
  }
  .item-icon:hover .item-tooltip { display: block; }

  .rune-icons {
    display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
  }

  .rune-icon {
    width: 24px; height: 24px; border-radius: 50%; overflow: hidden;
    opacity: 0; transform: scale(0.6);
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .rune-icon.keystone { width: 30px; height: 30px; }
  .rune-icon.visible { opacity: 1; transform: scale(1); }
  .rune-icon img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(1.1); }
  .rune-icon:hover { z-index: 10; }
  .rune-icon .rune-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #0c111c; border: 1px solid rgba(200, 170, 110, 0.2); border-radius: 2px;
    padding: 4px 8px; font-size: 11px; white-space: nowrap; color: var(--text);
    pointer-events: none; z-index: 20; margin-bottom: 4px;
  }
  .rune-icon:hover .rune-tooltip { display: block; }

  .rune-separator {
    width: 1px; height: 20px; background: rgba(200, 170, 110, 0.15); margin: 0 4px;
  }

  /* ── VS ── */
  .vs-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; position: relative; }
  .vs-line { width: 1px; flex: 1; background: linear-gradient(180deg, transparent, var(--border), transparent); }
  .vs-badge { position: relative; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; margin: 12px 0; }
  .vs-badge::before { content: ''; position: absolute; inset: 0; border: 1px solid var(--border); transform: rotate(45deg); }
  .vs-text {
    font-family: 'Teko', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-dim); opacity: 0; transition: opacity 0.6s; position: relative; z-index: 1;
  }
  .vs-text.reveal { opacity: 1; }

  .reroll-hint {
    text-align: center; margin-top: 32px; font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--text-dim); opacity: 0; animation: fadeIn 0.5s 1.2s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    .app { padding: 28px 16px 50px; }
    .panel { padding: 24px 20px; }
    .header h1 { letter-spacing: 6px; }
    .teams-container.visible { grid-template-columns: 1fr; gap: 0; }
    .vs-divider { flex-direction: row; padding: 16px 0; }
    .vs-line { width: auto; height: 1px; flex: 1; }
    .vs-badge { margin: 0 12px; }
    .btn-randomize { font-size: 24px; padding: 18px 48px; letter-spacing: 6px; }
    .team-card { padding: 28px 16px; }
    .champ-label { display: none; }
    .member-build { padding-left: 36px; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="grain"></div>
<div class="ambient-split"></div>
<div class="flash-overlay" id="flashOverlay"></div>

<div class="app">
  <header class="header">
    <div class="header-decor"></div>
    <h1>TEAM<br>ROULETTE</h1>
    <p class="subtitle">League of Legends &bull; Custom Games</p>
    <div class="header-line"><span></span><div class="diamond"></div><span></span></div>
  </header>

  <section class="panel">
    <label class="panel-label">Summoner Names</label>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter summoner name..." autocomplete="off" maxlength="40" spellcheck="false">
      <button class="btn-add" id="addBtn">ADD</button>
    </div>
    <div class="players-pool" id="playersPool">
      <span class="empty-state" id="emptyState">Waiting for summoners...</span>
    </div>
    <div class="player-count" id="playerCount" style="display:none">
      <span>Summoners: <strong id="countNum">0</strong></span>
      <span>&middot;</span>
      <span id="teamSizeHint"></span>
    </div>
  </section>

  <section class="panel">
    <label class="panel-label">Options</label>
    <div class="options-grid">
      <label class="option-item">
        <input type="checkbox" id="optChampions">
        <div class="checkbox-visual"></div>
        <div>
          <div class="option-label">Assign Champions</div>
          <div class="option-desc">Random champion for each player</div>
        </div>
      </label>
      <label class="option-item disabled" id="optBuildWrap">
        <input type="checkbox" id="optBuild" disabled>
        <div class="checkbox-visual"></div>
        <div>
          <div class="option-label">Build + Runes</div>
          <div class="option-desc">Off-meta builds based on champion stats</div>
        </div>
      </label>
    </div>
    <div class="data-status" id="dataStatus"></div>
  </section>

  <div class="action-bar">
    <div class="btn-randomize-wrap">
      <button class="btn-randomize" id="randomizeBtn" disabled><span>RANDOMIZE</span></button>
      <div class="btn-ring"></div>
    </div>
  </div>

  <div class="teams-container" id="teamsContainer">
    <div class="team-card blue" id="blueTeam">
      <div class="team-label"><span class="side-icon"></span>BLUE SIDE</div>
      <div class="team-members" id="blueMembers"></div>
    </div>
    <div class="vs-divider">
      <div class="vs-line"></div>
      <div class="vs-badge"><span class="vs-text" id="vsText">VS</span></div>
      <div class="vs-line"></div>
    </div>
    <div class="team-card red" id="redTeam">
      <div class="team-label"><span class="side-icon"></span>RED SIDE</div>
      <div class="team-members" id="redMembers"></div>
    </div>
  </div>

  <div class="reroll-hint" id="rerollHint" style="display:none">Click randomize again to re-roll</div>
</div>

<script>
  // ── Particles (unchanged) ──
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
      this.size = Math.random() * 1.5 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.3 + 0.05;
      this.pulseSpeed = Math.random() * 0.01 + 0.005;
      this.pulseOffset = Math.random() * Math.PI * 2;
      const r = this.x / canvas.width;
      this.color = r < 0.35 ? [14,165,233] : r > 0.65 ? [244,63,94] : [200,170,110];
    }
    update(t) {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < -10 || this.x > canvas.width+10 || this.y < -10 || this.y > canvas.height+10) this.reset();
      this.currentOpacity = this.opacity * (0.5 + (Math.sin(t * this.pulseSpeed + this.pulseOffset)*0.5+0.5)*0.5);
    }
    draw() {
      const [r,g,b] = this.color; ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${this.currentOpacity})`; ctx.fill();
    }
  }
  for (let i = 0; i < 50; i++) particles.push(new Particle());
  let frame = 0;
  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); frame++;
    particles.forEach(p => { p.update(frame); p.draw(); });
    for (let i = 0; i < particles.length; i++) for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x-particles[j].x, dy = particles[i].y-particles[j].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 120) {
        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(200,170,110,${(1-dist/120)*0.04})`; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // ── Data Dragon ──
  let ddragonVersion = '';
  let championList = [];
  let championsLoaded = false;
  let allItems = [];
  let itemsLoaded = false;
  let runesTrees = [];
  let runesLoaded = false;
  let isLoadingData = false;

  // Item pools by category
  let itemPools = { ap: [], ad: [], tank: [], attackSpeed: [], support: [], boots: [] };

  const dataStatus = document.getElementById('dataStatus');
  const optChampions = document.getElementById('optChampions');
  const optBuild = document.getElementById('optBuild');
  const optBuildWrap = document.getElementById('optBuildWrap');

  function updateDataStatus(text, isError) {
    dataStatus.classList.add('visible');
    dataStatus.classList.toggle('error', !!isError);
    dataStatus.innerHTML = text;
  }

  async function loadAllData() {
    if (isLoadingData) return;
    isLoadingData = true;
    updateDataStatus('Loading game data...');

    try {
      // Get latest version
      const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
      const versions = await vRes.json();
      ddragonVersion = versions[0];

      // Load champions, items, runes in parallel
      const [champRes, itemRes, runeRes] = await Promise.all([
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/champion.json`),
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/item.json`),
        fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/en_US/runesReforged.json`)
      ]);

      const champData = await champRes.json();
      const itemData = await itemRes.json();
      runesTrees = await runeRes.json();
      runesLoaded = true;

      // Process champions
      championList = Object.values(champData.data).map(c => ({
        id: c.id, name: c.name, image: c.image.full, tags: c.tags
      }));
      championsLoaded = true;

      // Process items — filter to completed, purchasable, Summoner's Rift items
      const rawItems = Object.entries(itemData.data);
      allItems = rawItems
        .filter(([id, item]) => {
          if (!item.gold || !item.gold.purchasable) return false;
          if (item.maps && !item.maps['11']) return false;
          if (item.requiredChampion) return false;
          return true;
        })
        .map(([id, item]) => ({
          id, name: item.name, image: item.image.full,
          gold: item.gold.total, tags: item.tags || [],
          stats: item.stats || {}, into: item.into,
          from: item.from, description: item.description || ''
        }));

      // Build item pools
      const finishedItems = allItems.filter(i => i.gold >= 2500 && (!i.into || i.into.length === 0));
      const boots = allItems.filter(i =>
        i.tags.includes('Boots') && i.gold >= 900 && i.gold <= 1600 && (!i.into || i.into.length === 0)
      );

      itemPools.boots = boots;

      finishedItems.forEach(item => {
        const t = item.tags;
        const s = item.stats;
        const desc = item.description.toLowerCase();
        const hasAP = s.FlatMagicDamageMod > 0 || desc.includes('ability power');
        const hasAD = s.FlatPhysicalDamageMod > 0 || desc.includes('attack damage');
        const hasAS = s.PercentAttackSpeedMod > 0 || desc.includes('attack speed');
        const hasArmor = s.FlatArmorMod > 0;
        const hasMR = s.FlatSpellBlockMod > 0;
        const hasHP = s.FlatHPPoolMod > 200;
        const hasCrit = s.FlatCritChanceMod > 0 || desc.includes('critical');

        if (hasAP) itemPools.ap.push(item);
        if (hasAD || hasCrit) itemPools.ad.push(item);
        if (hasAS || hasCrit) itemPools.attackSpeed.push(item);
        if (hasArmor || hasMR || hasHP) itemPools.tank.push(item);
        if (hasAP || hasHP || desc.includes('heal') || desc.includes('shield')) itemPools.support.push(item);
      });

      // Fallbacks — make sure no pool is empty
      const allFinished = finishedItems;
      for (const key of Object.keys(itemPools)) {
        if (key !== 'boots' && itemPools[key].length < 5) {
          itemPools[key] = allFinished.slice(0, 30);
        }
      }
      if (itemPools.boots.length === 0) {
        itemPools.boots = allItems.filter(i => i.tags.includes('Boots')).slice(0, 5);
      }

      itemsLoaded = true;

      const parts = [`<span class="count">${championList.length}</span> champions`];
      parts.push(`<span class="count">${finishedItems.length}</span> items`);
      parts.push(`<span class="count">${runesTrees.length}</span> rune trees`);
      updateDataStatus(`Loaded ${parts.join(' &middot; ')} (patch ${ddragonVersion})`);
    } catch (err) {
      updateDataStatus('Failed to load game data — check your connection', true);
      isLoadingData = false;
    }
  }

  optChampions.addEventListener('change', () => {
    if (optChampions.checked) {
      loadAllData();
      optBuildWrap.classList.remove('disabled');
      optBuild.disabled = false;
    } else {
      optBuildWrap.classList.add('disabled');
      optBuild.checked = false;
      optBuild.disabled = true;
      if (!championsLoaded) {
        dataStatus.classList.remove('visible');
      }
    }
  });

  optBuild.addEventListener('change', () => {
    if (optBuild.checked) loadAllData();
  });

  function getIconUrl(type, imageFile) {
    return `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/${type}/${imageFile}`;
  }

  // ── Build Generation ──
  // Classify champion into a build archetype
  function classifyChampion(champion) {
    const tags = champion.tags;
    if (tags.includes('Marksman')) return 'adc';
    if (tags.includes('Assassin') && tags.includes('Mage')) return 'ap_assassin';
    if (tags.includes('Assassin')) return 'ad_assassin';
    if (tags.includes('Mage')) return 'mage';
    if (tags.includes('Tank')) return 'tank';
    if (tags.includes('Fighter')) return 'bruiser';
    if (tags.includes('Support')) return 'support';
    return 'bruiser';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickUnique(pool, count, exclude) {
    const available = shuffle(pool.filter(i => !exclude.has(i.id)));
    return available.slice(0, count);
  }

  function generateBuild(champion) {
    const archetype = classifyChampion(champion);
    const used = new Set();
    const items = [];

    // Pick boots
    const boot = shuffle(itemPools.boots)[0];
    if (boot) { items.push(boot); used.add(boot.id); }

    // Define weights: [primary pool, primary count, offmeta pool, offmeta count]
    const archetypeConfig = {
      mage:        { primary: 'ap', pCount: 3, offmeta: ['tank', 'ad', 'support'], oCount: 2 },
      ap_assassin: { primary: 'ap', pCount: 3, offmeta: ['ad', 'attackSpeed', 'tank'], oCount: 2 },
      ad_assassin: { primary: 'ad', pCount: 3, offmeta: ['ap', 'tank', 'attackSpeed'], oCount: 2 },
      adc:         { primary: 'attackSpeed', pCount: 2, offmeta: ['ap', 'tank', 'ad'], oCount: 3 },
      tank:        { primary: 'tank', pCount: 3, offmeta: ['ap', 'ad', 'support'], oCount: 2 },
      bruiser:     { primary: 'ad', pCount: 2, offmeta: ['tank', 'ap', 'attackSpeed'], oCount: 3 },
      support:     { primary: 'support', pCount: 3, offmeta: ['ap', 'tank', 'ad'], oCount: 2 },
    };

    const config = archetypeConfig[archetype] || archetypeConfig.bruiser;

    // Primary items
    const primary = pickUnique(itemPools[config.primary], config.pCount, used);
    primary.forEach(i => { items.push(i); used.add(i.id); });

    // Off-meta items from random pools
    const offmetaPools = shuffle(config.offmeta);
    let remaining = 6 - items.length;
    for (const poolName of offmetaPools) {
      if (remaining <= 0) break;
      const picks = pickUnique(itemPools[poolName], Math.min(remaining, 2), used);
      picks.forEach(i => { items.push(i); used.add(i.id); });
      remaining = 6 - items.length;
    }

    // If we still need items, grab from any pool
    if (items.length < 6) {
      const allPools = [...itemPools.ap, ...itemPools.ad, ...itemPools.tank, ...itemPools.attackSpeed];
      const extra = pickUnique(allPools, 6 - items.length, used);
      extra.forEach(i => items.push(i));
    }

    return items.slice(0, 6);
  }

  // ── Rune Generation ──
  function generateRunes(champion) {
    const archetype = classifyChampion(champion);

    // Preferred primary trees by archetype
    const treePrefs = {
      mage: ['Sorcery', 'Domination'],
      ap_assassin: ['Domination', 'Sorcery'],
      ad_assassin: ['Domination', 'Precision'],
      adc: ['Precision', 'Domination'],
      tank: ['Resolve', 'Inspiration'],
      bruiser: ['Precision', 'Resolve'],
      support: ['Resolve', 'Inspiration'],
    };

    const prefs = treePrefs[archetype] || ['Precision', 'Domination'];

    // Off-meta: 50% chance to use preferred tree, 50% random
    const allTreeNames = runesTrees.map(t => t.name);
    const usePref = Math.random() < 0.5;
    const primaryTreeName = usePref
      ? prefs[0]
      : shuffle(allTreeNames)[0];

    const primaryTree = runesTrees.find(t => t.name === primaryTreeName) || runesTrees[0];

    // Secondary tree: different from primary
    const secondaryOptions = runesTrees.filter(t => t.name !== primaryTree.name);
    const secondaryTree = usePref
      ? (secondaryOptions.find(t => t.name === prefs[1]) || shuffle(secondaryOptions)[0])
      : shuffle(secondaryOptions)[0];

    const runes = [];

    // Primary: keystone (slot 0) + one from each of slots 1-3
    if (primaryTree.slots && primaryTree.slots.length >= 4) {
      // Keystone
      const keystones = primaryTree.slots[0].runes;
      const keystone = shuffle(keystones)[0];
      runes.push({ ...keystone, isKeystone: true, tree: primaryTree.name });

      // One from each remaining row
      for (let s = 1; s < Math.min(primaryTree.slots.length, 4); s++) {
        const options = primaryTree.slots[s].runes;
        runes.push({ ...shuffle(options)[0], tree: primaryTree.name });
      }
    }

    // Secondary: 2 runes from 2 different slots (slots 1-3)
    if (secondaryTree.slots && secondaryTree.slots.length >= 4) {
      const slotIndices = shuffle([1, 2, 3]).slice(0, 2);
      for (const s of slotIndices) {
        if (s < secondaryTree.slots.length) {
          const options = secondaryTree.slots[s].runes;
          runes.push({ ...shuffle(options)[0], tree: secondaryTree.name, isSecondary: true });
        }
      }
    }

    return { runes, primaryTree: primaryTree.name, secondaryTree: secondaryTree.name };
  }

  // ── App Logic ──
  const players = [];
  const nameInput = document.getElementById('nameInput');
  const addBtn = document.getElementById('addBtn');
  const playersPool = document.getElementById('playersPool');
  const emptyState = document.getElementById('emptyState');
  const playerCount = document.getElementById('playerCount');
  const countNum = document.getElementById('countNum');
  const teamSizeHint = document.getElementById('teamSizeHint');
  const randomizeBtn = document.getElementById('randomizeBtn');
  const teamsContainer = document.getElementById('teamsContainer');
  const blueMembers = document.getElementById('blueMembers');
  const redMembers = document.getElementById('redMembers');
  const vsText = document.getElementById('vsText');
  const blueTeam = document.getElementById('blueTeam');
  const redTeam = document.getElementById('redTeam');
  const flashOverlay = document.getElementById('flashOverlay');
  const rerollHint = document.getElementById('rerollHint');

  function updateUI() {
    const count = players.length;
    countNum.textContent = count;
    emptyState.style.display = count === 0 ? 'inline' : 'none';
    playerCount.style.display = count > 0 ? 'flex' : 'none';
    randomizeBtn.disabled = count < 2;
    if (count < 2) {
      teamSizeHint.textContent = 'Need at least 2';
    } else {
      const half = Math.floor(count / 2);
      const other = count - half;
      teamSizeHint.textContent = half === other ? `${half}v${other}` : `${other}v${half} (uneven)`;
    }
  }

  function addPlayer(name) {
    const trimmed = name.trim();
    if (!trimmed || players.some(p => p.toLowerCase() === trimmed.toLowerCase())) return;
    players.push(trimmed);
    const tag = document.createElement('div');
    tag.className = 'player-tag';
    tag.innerHTML = `<span class="tag-name">${escapeHtml(trimmed)}</span><button class="remove" title="Remove">&times;</button>`;
    tag.querySelector('.remove').addEventListener('click', () => {
      const idx = players.indexOf(trimmed);
      if (idx > -1) players.splice(idx, 1);
      tag.style.animation = 'none'; tag.style.transition = 'all 0.2s';
      tag.style.opacity = '0'; tag.style.transform = 'scale(0.8)';
      setTimeout(() => tag.remove(), 200);
      updateUI();
    });
    playersPool.appendChild(tag);
    updateUI();
  }

  function escapeHtml(str) {
    const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
  }

  addBtn.addEventListener('click', () => { addPlayer(nameInput.value); nameInput.value = ''; nameInput.focus(); });
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { addPlayer(nameInput.value); nameInput.value = ''; } });

  const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz0123456789';
  function scrambleReveal(el, finalText, duration = 600) {
    const steps = 8, interval = duration / steps;
    let step = 0;
    el.classList.add('scrambling');
    const timer = setInterval(() => {
      step++;
      if (step >= steps) { clearInterval(timer); el.textContent = finalText; el.classList.remove('scrambling'); return; }
      const rc = Math.floor((step / steps) * finalText.length);
      let d = finalText.substring(0, rc);
      for (let i = rc; i < finalText.length; i++) d += CHARS[Math.floor(Math.random() * CHARS.length)];
      el.textContent = d;
    }, interval);
  }

  function createMemberEl(index, playerName, champion, build, runeData, delay) {
    const el = document.createElement('div');
    el.className = 'team-member';

    // Header row
    const header = document.createElement('div');
    header.className = 'member-header';

    const numSpan = document.createElement('span');
    numSpan.className = 'member-number';
    numSpan.textContent = index + 1;
    header.appendChild(numSpan);

    let portraitEl = null;
    if (champion) {
      portraitEl = document.createElement('div');
      portraitEl.className = 'champ-portrait';
      const img = document.createElement('img');
      img.src = getIconUrl('champion', champion.image);
      img.alt = champion.name;
      img.loading = 'lazy';
      portraitEl.appendChild(img);
      header.appendChild(portraitEl);
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'member-name';
    nameSpan.textContent = '';
    header.appendChild(nameSpan);

    if (champion) {
      const champLabel = document.createElement('span');
      champLabel.className = 'champ-label';
      champLabel.textContent = champion.name;
      champLabel.style.opacity = '0';
      champLabel.style.transition = 'opacity 0.4s';
      header.appendChild(champLabel);
      setTimeout(() => { champLabel.style.opacity = '0.5'; }, delay + 600);
    }

    el.appendChild(header);

    // Build + Runes section
    let buildSection = null;
    if (build || runeData) {
      buildSection = document.createElement('div');
      buildSection.className = 'member-build';

      // Items
      if (build && build.length > 0) {
        const itemLabel = document.createElement('div');
        itemLabel.className = 'build-section-label';
        itemLabel.textContent = 'BUILD';
        buildSection.appendChild(itemLabel);

        const itemRow = document.createElement('div');
        itemRow.className = 'build-items';
        build.forEach((item, i) => {
          const iconWrap = document.createElement('div');
          iconWrap.className = 'item-icon';
          const img = document.createElement('img');
          img.src = getIconUrl('item', item.image);
          img.alt = item.name;
          img.loading = 'lazy';
          iconWrap.appendChild(img);
          const tooltip = document.createElement('div');
          tooltip.className = 'item-tooltip';
          tooltip.textContent = item.name;
          iconWrap.appendChild(tooltip);
          itemRow.appendChild(iconWrap);
          setTimeout(() => iconWrap.classList.add('visible'), delay + 700 + i * 80);
        });
        buildSection.appendChild(itemRow);
      }

      // Runes
      if (runeData && runeData.runes.length > 0) {
        const runeLabel = document.createElement('div');
        runeLabel.className = 'build-section-label';
        runeLabel.textContent = 'RUNES';
        buildSection.appendChild(runeLabel);

        const runeRow = document.createElement('div');
        runeRow.className = 'rune-icons';

        let addedPrimary = false;
        runeData.runes.forEach((rune, i) => {
          // Add separator between primary and secondary
          if (rune.isSecondary && !addedPrimary) {
            addedPrimary = true;
            const sep = document.createElement('div');
            sep.className = 'rune-separator';
            runeRow.appendChild(sep);
          }

          const iconWrap = document.createElement('div');
          iconWrap.className = 'rune-icon' + (rune.isKeystone ? ' keystone' : '');
          const img = document.createElement('img');
          // Rune icons use the full path from the rune data
          img.src = `https://ddragon.leagueoflegends.com/cdn/img/${rune.icon}`;
          img.alt = rune.name;
          img.loading = 'lazy';
          iconWrap.appendChild(img);
          const tooltip = document.createElement('div');
          tooltip.className = 'rune-tooltip';
          tooltip.textContent = rune.name;
          iconWrap.appendChild(tooltip);
          runeRow.appendChild(iconWrap);
          setTimeout(() => iconWrap.classList.add('visible'), delay + 1100 + i * 80);
        });
        buildSection.appendChild(runeRow);
      }

      el.appendChild(buildSection);
      setTimeout(() => buildSection.classList.add('visible'), delay + 650);
    }

    setTimeout(() => {
      el.classList.add('reveal');
      scrambleReveal(nameSpan, playerName, 500);
      if (portraitEl) setTimeout(() => portraitEl.classList.add('visible'), 200);
    }, delay);

    return el;
  }

  function renderTeams(blue, red, blueData, redData) {
    blueMembers.innerHTML = '';
    redMembers.innerHTML = '';
    const maxLen = Math.max(blue.length, red.length);
    const useChamps = optChampions.checked && championsLoaded;
    const useBuild = optBuild.checked && itemsLoaded && runesLoaded;

    for (let i = 0; i < maxLen; i++) {
      if (i < blue.length) {
        const champ = useChamps && blueData ? blueData[i].champion : null;
        const build = useBuild && blueData ? blueData[i].build : null;
        const runes = useBuild && blueData ? blueData[i].runes : null;
        const el = createMemberEl(i, blue[i], champ, build, runes, 200 + i * 300);
        blueMembers.appendChild(el);
      }
      if (i < red.length) {
        const champ = useChamps && redData ? redData[i].champion : null;
        const build = useBuild && redData ? redData[i].build : null;
        const runes = useBuild && redData ? redData[i].runes : null;
        const el = createMemberEl(i, red[i], champ, build, runes, 350 + i * 300);
        redMembers.appendChild(el);
      }
    }
  }

  randomizeBtn.addEventListener('click', () => {
    if (players.length < 2) return;

    teamsContainer.classList.remove('visible');
    blueTeam.classList.remove('reveal');
    redTeam.classList.remove('reveal');
    vsText.classList.remove('reveal');
    rerollHint.style.display = 'none';
    randomizeBtn.classList.add('shuffling');
    randomizeBtn.disabled = true;

    setTimeout(() => {
      randomizeBtn.classList.remove('shuffling');
      randomizeBtn.disabled = false;

      flashOverlay.classList.remove('fire');
      void flashOverlay.offsetWidth;
      flashOverlay.classList.add('fire');

      const shuffled = shuffle(players);
      const half = Math.floor(shuffled.length / 2);
      const blueArr = shuffled.slice(0, half);
      const redArr = shuffled.slice(half);

      let blueData = null, redData = null;
      const useChamps = optChampions.checked && championsLoaded;
      const useBuild = optBuild.checked && itemsLoaded && runesLoaded;

      if (useChamps) {
        const champs = shuffle(championList).slice(0, shuffled.length);
        blueData = blueArr.map((_, i) => {
          const champion = champs[i];
          return {
            champion,
            build: useBuild ? generateBuild(champion) : null,
            runes: useBuild ? generateRunes(champion) : null,
          };
        });
        redData = redArr.map((_, i) => {
          const champion = champs[half + i];
          return {
            champion,
            build: useBuild ? generateBuild(champion) : null,
            runes: useBuild ? generateRunes(champion) : null,
          };
        });
      }

      teamsContainer.classList.add('visible');
      setTimeout(() => blueTeam.classList.add('reveal'), 50);
      setTimeout(() => vsText.classList.add('reveal'), 200);
      setTimeout(() => redTeam.classList.add('reveal'), 300);

      renderTeams(blueArr, redArr, blueData, redData);

      rerollHint.style.display = 'block';
      rerollHint.style.animation = 'none';
      void rerollHint.offsetWidth;
      rerollHint.style.animation = 'fadeIn 0.5s 1.5s forwards';
      rerollHint.style.opacity = '0';
    }, 700);
  });

  updateUI();
</script>

</body>
</html>
